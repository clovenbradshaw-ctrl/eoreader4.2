<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EO Reader</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#F4F4F7">
<!-- Resource hints for the reader surface's webfonts — the SAME hints its own template
     declares (src/rooms/reader/ui/shell.template.html's helmet block, injected into this
     head once the surface mounts; harmless duplicate, identical hrefs). Declaring them here
     up front lets the browser's HTML preload scanner start the font connection/fetch
     immediately, in parallel with everything else, instead of waiting on the whole boot
     chain. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
<!-- Critical design tokens — the handful of custom properties this shell's own loading/failure
     markup could need, available immediately, before shell.css (the full stylesheet, loaded by
     shell-loader.js once the page runs) arrives. Also declared in shell.css itself; a harmless
     duplicate, same values. -->
<style>
:root{
  --eo-m-accent:#6355F2; --eo-m-accent-tint:#ECE9FE;
  --eo-m-ink:#17171A; --eo-m-text:#1B1B22; --eo-m-muted:#7A7A83; --eo-m-faint:#9B9BA3;
  --eo-m-border:#ECECF0; --eo-m-canvas:#F4F4F6;
  --eo-m-success-fg:#1E8A50; --eo-m-success-bg:#E7F6EC;
  --eo-m-danger-fg:#B23A2E; --eo-m-danger-bg:#FBE9E6;
}
</style>
<!-- defer (not a blocking classic <script>) so the HTML parser isn't stalled fetching+running
     ~140KB of vendor JS before it can even reach the rest of the page; defer preserves this
     document order (react → react-dom → olm → support.js) and all three still run before the
     module-deferred scripts below — only the parser stops waiting on them. -->
<script defer src="vendor/react.production.min.js"></script>
<script defer src="vendor/react-dom.production.min.js"></script>
<!-- libolm (vendored) — the Olm/Megolm primitive behind the optional E2EE chat. Sets
     window.Olm; the wasm is fetched lazily on Olm.init() the first time chat opens. -->
<script defer src="vendor/olm/olm.js"></script>
<script defer src="./support.js"></script>
<!-- The reader surface: fetches the DC template + controller (shell.template.html,
     shell.logic.js — moved out of this file so it stays a thin boot shell) and shell.css,
     in parallel, then installs them into the dc-runtime support.js just started. Ordered
     BEFORE boot.js so the surface can fetch and mount without waiting on the engine's own
     (much larger) module graph — the same relationship this shell already had, since the
     template used to sit inline here and mounted via support.js before boot.js ever ran;
     the Component it defines already tolerates window.EO not existing yet (rooms/reader
     boot.js fires 'eo:ready' the moment it is, and the surface adopts it then). -->
<script type="module" src="src/rooms/reader/ui/shell-loader.js"></script>
<script type="module" src="src/rooms/reader/boot.js"></script>
<!-- Boot failsafe. The reader surface mounts through shell-loader.js + the dc-runtime:
     support.js mounts React into #dc-root once shell-loader.js has fetched and installed
     the template + controller. If that never happens — a stale cached build, a script that
     failed to load or parse, a slow or failed fetch — the page would otherwise sit on the
     loading shell below forever. Show an actionable reload prompt after a grace period
     instead. Pure, dependency-free. The grace period is generous (shell-loader.js adds two
     network fetches that a fully-inline template never needed) so a slow connection sees
     its own loading shell, not a false "reload" prompt.
     NB: this file must contain NO literal dc root tag, angle bracket and all (comments
     included) — the dc-runtime's own best-effort refetch-and-reparse of this very page
     (support.js `boot()`) scans its raw text for the first such tag, and a stray occurrence
     here would be mistaken for the real one. -->
<style>x-dc{display:none!important}</style>
<script>
(function () {
  function clearShell() {
    var shell = document.getElementById('eo-boot-shell');
    if (shell && shell.parentNode) shell.parentNode.removeChild(shell);
  }
  function booted() {
    // #dc-root is the one unambiguous signal: the dc-runtime creates it only once the
    // reader surface's template has actually compiled and mounted (support.js `boot()`).
    var ok = !!document.getElementById('dc-root');
    if (ok) clearShell();
    return ok;
  }
  function showFallback() {
    if (document.getElementById('eo-boot-fallback') || booted()) return;
    clearShell();
    var d = document.createElement('div');
    d.id = 'eo-boot-fallback';
    d.style.cssText = 'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:24px;background:#F4F4F7;color:#1a1a2e;font:16px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-align:center';
    d.innerHTML =
      '<div style="max-width:34rem">' +
      '<div style="font-size:2rem;font-weight:600;margin-bottom:.5rem">EO Reader</div>' +
      '<p style="margin:.25rem 0 1.25rem;color:#4a4a63">The reader didn’t finish loading. This is usually an older cached copy of the app.</p>' +
      '<button id="eo-boot-reload" style="border:none;border-radius:10px;padding:.7rem 1.3rem;background:#5b5bd6;color:#fff;font:inherit;font-weight:600;cursor:pointer">Reload the app</button>' +
      '<p style="margin:1rem 0 0;font-size:.85rem;color:#7a7a90">If it keeps happening, hard-reload with Ctrl/Cmd + Shift + R.</p>' +
      '</div>';
    document.body.appendChild(d);
    document.getElementById('eo-boot-reload').addEventListener('click', hardReset);
  }
  // A true escape hatch from a stuck cached copy: drop every cache and controlling worker, then
  // reload from the network. This is what actually ejects an old build when a plain reload won't.
  function hardReset() {
    var done = function () { location.reload(); };
    try {
      var jobs = [];
      if (window.caches && caches.keys) {
        jobs.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }));
      }
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }));
      }
      Promise.all(jobs).then(done, done);
      setTimeout(done, 1500); // never hang on the escape hatch
    } catch (e) { done(); }
  }
  window.hardReset = hardReset; // reachable from the app's Settings ("Reset app / clear cache")
  var bootWatch = setInterval(function () { if (booted()) clearInterval(bootWatch); }, 120);
  setTimeout(function () { clearInterval(bootWatch); }, 20000);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { setTimeout(showFallback, 8000); });
  } else {
    setTimeout(showFallback, 8000);
  }
  window.addEventListener('load', function () { setTimeout(showFallback, 8000); });

  // Freshness guard: register the network-revalidating worker (see sw.js) so a returning phone can
  // never boot a stale build while online. `updateViaCache:'none'` means the worker script itself is
  // always fetched fresh, so a fix to the worker ships on the next load. When a newly-installed worker
  // takes control, reload ONCE so the page runs under it (and thus gets force-revalidated assets).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
        .then(function (reg) { reg.update(); })
        .catch(function () {});
    });
    var swRefreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (swRefreshing) return;
      swRefreshing = true;
      location.reload();
    });
  }
})();
</script>
</head>
<body>
<div id="eo-boot-shell" role="status" aria-live="polite" style="position:fixed;inset:0;z-index:2147483646;display:flex;align-items:center;justify-content:center;padding:24px;background:#F4F4F7;color:#1a1a2e;font:16px/1.5 system-ui,-apple-system,&quot;Segoe UI&quot;,Roboto,sans-serif;text-align:center">
  <div style="max-width:34rem">
    <div style="font-size:2rem;font-weight:600;margin-bottom:.5rem">EO Reader</div>
    <p style="margin:.25rem 0;color:#4a4a63">Loading the reader…</p>
  </div>
</div>
</body>
</html>

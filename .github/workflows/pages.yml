name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# First-launch note: in the repo's Settings → Pages, set "Build and deployment"
# Source = "GitHub Actions". Until that's set once, this deploy step 404s on the
# very first run even though the build is fine — it is the one manual step Actions
# can't do for you. `enablement: true` below asks the API to turn Pages on, which
# covers most cases; the Settings toggle is the fallback if the org disallows it.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bundle the reader module graph
        # src/** stays a buildless ES-module graph in the repo (local dev/tests never build);
        # this is the one deploy-time step that turns it into a single fast-loading bundle —
        # see build/build.mjs and sw.js's header comment for why the graph was ~800 requests.
        run: |
          npm ci
          npm run build
      - name: Stage the site (exclude repo cruft)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' \
            --exclude='_site' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='build' \
            ./ _site/
          touch _site/.nojekyll
      - name: Stamp the build version (what produced this)
        # Write the exact commit this deploy came from beside the site. The running app fetches it
        # as ./version.json (rooms/reader/provenance.js) so every exported conversation audit can
        # name its producer — the app, the build, and how current that build is against GitHub.
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          cat > _site/version.json <<JSON
          {
            "app": "EO Reader",
            "version": "4.2",
            "commit": "${{ github.sha }}",
            "shortCommit": "$SHORT_SHA",
            "ref": "${{ github.ref_name }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo": "${{ github.repository }}",
            "runId": "${{ github.run_id }}"
          }
          JSON
      - name: Point the deployed shell at the bundle
        # The committed index.html loads src/rooms/reader/boot.js directly (unbundled — that's
        # what local dev/tests run against). Only the deployed copy is repointed at the bundled
        # entry produced above, tagged with this commit so the SAME URL can never serve two
        # different builds — sw.js trusts that to skip revalidation for this one file (see its
        # `?v=` handling) instead of a 304 round trip on every load.
        #
        # The same tag is stamped on the vendored/generated shell scripts (react, react-dom, olm,
        # support.js) for the same reason: each is committed as a fixed path with no content hash,
        # so it only ever changes alongside a new commit. Tagging them `?v=<sha>` makes every one
        # of those URLs content-addressed too, so sw.js can skip the conditional-GET round trip for
        # all four on every load, not just the bundle — index.html itself stays untagged (it's the
        # one shell file whose content sw.js must always revalidate, since it's what the pipeline
        # just edited).
        run: |
          sed -i \
            -e "s#<script type=\"module\" src=\"src/rooms/reader/boot.js\"></script>#<script type=\"module\" src=\"src/rooms/reader/boot.bundle.js?v=${SHORT_SHA}\"></script>#" \
            -e "s#<script defer src=\"vendor/react.production.min.js\"></script>#<script defer src=\"vendor/react.production.min.js?v=${SHORT_SHA}\"></script>#" \
            -e "s#<script defer src=\"vendor/react-dom.production.min.js\"></script>#<script defer src=\"vendor/react-dom.production.min.js?v=${SHORT_SHA}\"></script>#" \
            -e "s#<script defer src=\"vendor/olm/olm.js\"></script>#<script defer src=\"vendor/olm/olm.js?v=${SHORT_SHA}\"></script>#" \
            -e "s#<script defer src=\"./support.js\"></script>#<script defer src=\"./support.js?v=${SHORT_SHA}\"></script>#" \
            _site/index.html
          grep -q "boot.bundle.js?v=${SHORT_SHA}" _site/index.html
          grep -q "vendor/react.production.min.js?v=${SHORT_SHA}" _site/index.html
          grep -q "vendor/react-dom.production.min.js?v=${SHORT_SHA}" _site/index.html
          grep -q "vendor/olm/olm.js?v=${SHORT_SHA}" _site/index.html
          grep -q "./support.js?v=${SHORT_SHA}" _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
